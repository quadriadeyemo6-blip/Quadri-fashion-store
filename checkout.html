<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Checkout - Quadri Fashion</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">Fashion</a>
        <div class="ms-auto">
          <a class="btn btn-outline-light position-relative go-checkout">
            <i class="bi bi-cart"></i> Cart
            <span
              id="cart-count"
              class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
            >
              0
            </span>
          </a>
        </div>
      </div>
    </nav>

    <!-- Checkout Section -->
    <section class="py-5">
      <div class="container">
        <h2 class="mb-4">Checkout</h2>
        <div class="row">
          <!-- Cart Summary -->
          <div class="col-md-6">
            <h4>Your Cart</h4>
            <ul id="checkout-cart" class="list-group mb-3"></ul>
            <p class="fw-bold">Total: $<span id="checkout-total">0</span></p>
          </div>

          <!-- Customer Info -->
          <div class="col-md-6">
            <h4>Customer Information</h4>
            <form id="checkout-form">
              <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input
                  type="text"
                  id="full-name"
                  class="form-control"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Email</label>
                <input
                  type="email"
                  id="customer-email"
                  class="form-control"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Address</label>
                <input type="text" id="address" class="form-control" required />
              </div>

              <div class="mb-3">
                <label class="form-label">City</label>
                <input type="text" id="city" class="form-control" required />
              </div>

              <div class="mb-3">
                <label class="form-label">Country</label>
                <input type="text" id="country" class="form-control" required />
              </div>

              <button type="submit" class="btn btn-success w-100">
                Proceed to Payment
              </button>
            </form>
          </div>
        </div>
      </div>
      <div class="mt-3">
        <a href="shop.html" class="btn btn-outline-dark w-100"
          >← Back to Shop</a
        >
      </div>
    </section>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center p-3">
      <p>&copy; 2026 Quadri Fashion. All rights reserved.</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Paystack -->
    <script src="https://js.paystack.co/v1/inline.js"></script>

    <!-- Checkout page logic -->
    <script src="checkout.js"></script>
  </body>
</html>
