<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patek Philippe Watch - Lorem. Fashion</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="view-details.css" />
    <link rel="stylesheet" href="cart.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">Fashion</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="shop.html">Shop</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="about.html">About</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="contact.html">Contact</a>
            </li>

            <!-- SINGLE CART BUTTON (modal trigger) -->
            <li class="nav-item">
              <button
                class="btn btn-outline-light ms-3"
                data-bs-toggle="modal"
                data-bs-target="#cartModal"
              >
                <i class="bi bi-cart"></i> Cart
                <span id="cart-count" class="badge bg-danger rounded-pill"
                  >0</span
                >
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Product Detail Section -->
    <section class="py-5">
      <div class="container">
        <div class="row">
          <div class="col-md-6">
            <img
              src="image/Patek Philippe.jpg"
              class="img-fluid"
              alt="Patek Philippe Watch"
              style="height: 250px; object-fit: cover; width: 400px"
            />
          </div>
          <div class="col-md-6">
            <h2>Patek Philippe Watch</h2>
            <p class="text-muted">$120</p>
            <p>
              Luxury Patek Philippe watch with exquisite craftsmanship and
              timeless design.
            </p>
            <button
              class="btn btn-dark add-to-cart"
              data-name="Patek Philippe Watch"
              data-price="120"
            >
              Add to Cart
            </button>
          </div>
        </div>
      </div>
    </section>
    <!-- Cart Modal -->
    <div class="modal fade" id="cartModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Your Shopping Cart</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <ul id="cart-items" class="list-group"></ul>
            <p class="mt-3 fw-bold">Total: $<span id="cart-total">0</span></p>
          </div>
          <div class="modal-footer">
            <div class="d-flex flex-column w-100">
              <input
                type="email"
                id="customer-email"
                class="form-control mb-2"
                placeholder="Enter your email"
                required
              />
              <h3 class="mt-4">Delivery Details</h3>

              <form id="delivery-form" class="mb-4">
                <div class="mb-3">
                  <label class="form-label">Full Name</label>
                  <input
                    type="text"
                    id="delivery-name"
                    class="form-control"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">Phone Number</label>
                  <input
                    type="text"
                    id="delivery-phone"
                    class="form-control"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">Delivery Address</label>
                  <textarea
                    id="delivery-address"
                    class="form-control"
                    rows="3"
                    required
                  ></textarea>
                </div>

                <div class="mb-3">
                  <label class="form-label">City</label>
                  <input
                    type="text"
                    id="delivery-city"
                    class="form-control"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">State</label>
                  <input
                    type="text"
                    id="delivery-state"
                    class="form-control"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">Order Note (Optional)</label>
                  <textarea
                    id="delivery-note"
                    class="form-control"
                    rows="2"
                  ></textarea>
                </div>
              </form>

              <div class="d-flex justify-content-between">
                <a href="shop.html" class="btn btn-outline-dark"
                  >← Continue Shopping</a
                >
                <button id="checkout-btn" class="btn btn-success">
                  Go to Checkout
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Paystack must load BEFORE your script -->
  <script src="https://js.paystack.co/v1/inline.js"></script>

  <!-- Your script.js (load ONCE, after Paystack) -->
  <script src="./script.js"></script>
</html>
