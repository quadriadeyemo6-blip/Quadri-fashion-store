<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop - Lorem. Fashion</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="css/shop.css" />
    <link rel="stylesheet" href="css/cart.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">Fashion</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="shop.html">Shop</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="about.html">About</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="contact.html">Contact</a>
            </li>

            <!-- SINGLE CART BUTTON (modal trigger) -->
            <li class="nav-item">
              <button
                class="btn btn-outline-light ms-3"
                data-bs-toggle="modal"
                data-bs-target="#cartModal"
              >
                <i class="bi bi-cart"></i> Cart
                <span id="cart-count" class="badge bg-danger rounded-pill"
                  >0</span
                >
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <section class="py-5">
      <div class="container">
        <h2 class="text-center mb-4">Shop All Products</h2>

        <div class="card shadow-sm mb-4">
          <div
            class="card-body d-flex flex-wrap justify-content-between align-items-center"
          >
            <!-- Category Filter -->
            <div class="mb-2">
              <label for="categoryFilter" class="form-label fw-bold">
                <i class="bi bi-tags"></i> Category
              </label>
              <select id="categoryFilter" class="form-select border-dark">
                <option value="all">All Categories</option>
                <option value="dresses">Dresses</option>
                <option value="jackets">Jackets</option>
                <option value="accessories">Accessories</option>
              </select>
            </div>

            <!-- Sort Filter -->
            <div class="mb-2">
              <label for="sortFilter" class="form-label fw-bold">
                <i class="bi bi-funnel"></i> Sort By
              </label>
              <select id="sortFilter" class="form-select border-dark">
                <option value="default">Default</option>
                <option value="priceLow">Price: Low to High</option>
                <option value="priceHigh">Price: High to Low</option>
                <option value="nameAZ">Name: A–Z</option>
                <option value="nameZA">Name: Z–A</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Product Grid -->
        <div class="row" id="productGrid">
          <div
            class="col-md-4 product-card"
            data-category="dresses"
            data-price="120"
            data-name="Red Evening Dress"
          >
            <div class="card">
              <img
                src="image/Dress.jpg"
                class="card-img-top"
                alt="Red Dress"
                style="height: 250px; object-fit: cover"
              />
              <div class="card-body text-center">
                <h5 class="card-title">Red Evening Dress</h5>
                <p>$120</p>
                <button
                  class="btn btn-dark add-to-cart"
                  data-name="Red Evening Dress"
                  data-price="120"
                >
                  Add to Cart
                </button>
              </div>
            </div>
          </div>
          <div
            class="col-md-4 product-card"
            data-category="jackets"
            data-price="200"
            data-name="Luxury Jacket"
          >
            <div class="card">
              <img
                src="image/Denim Jacket.jpg"
                class="card-img-top"
                alt="Jacket"
                style="height: 250px; object-fit: cover"
              />
              <div class="card-body text-center">
                <h5 class="card-title">Luxury Jacket</h5>
                <p>$200</p>
                <button
                  class="btn btn-dark add-to-cart"
                  data-name="Luxury Jacket"
                  data-price="200"
                >
                  Add to Cart
                </button>
              </div>
            </div>
          </div>
          <!-- Add more products with data-category, data-price, data-name -->
        </div>
      </div>
    </section>
    <section class="py-5">
      <div class="container">
        <h2 class="text-center mb-4">Shop by Category</h2>
        <div class="row">
          <div class="col-md-4">
            <div class="card">
              <img
                src="image/Dress.jpg"
                class="card-img-top"
                alt="Dresses"
                style="height: 250px; object-fit: cover"
              />
              <div class="card-body text-center">
                <h5 class="card-title">Dresses</h5>
                <a href="dresses.html" class="btn btn-dark">View Collection</a>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card">
              <img
                src="image/Denim Jackets.jpg"
                class="card-img-top"
                alt="Jackets"
                style="height: 250px; object-fit: cover"
              />
              <div class="card-body text-center">
                <h5 class="card-title">Jackets</h5>
                <a href="jackets.html" class="btn btn-dark">View Collection</a>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card">
              <img
                src="image/Dress.jpg"
                class="card-img-top"
                alt="Accessories"
                style="height: 250px; object-fit: cover"
              />
              <div class="card-body text-center">
                <h5 class="card-title">Accessories</h5>
                <a href="accessories.html" class="btn btn-dark"
                  >View Collection</a
                >
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
    <!-- Cart Modal -->
    <div class="modal fade" id="cartModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Your Shopping Cart</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <ul id="cart-items" class="list-group"></ul>
            <p class="mt-3 fw-bold">Total: $<span id="cart-total">0</span></p>
          </div>
          <div class="modal-footer">
            <div class="d-flex flex-column w-100">
              <input
                type="email"
                id="customer-email"
                class="form-control mb-2"
                placeholder="Enter your email"
                required
              />
              <h3 class="mt-4">Delivery Details</h3>

              <form id="delivery-form" class="mb-4">
                <div class="mb-3">
                  <label class="form-label">Full Name</label>
                  <input
                    type="text"
                    id="delivery-name"
                    class="form-control"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">Phone Number</label>
                  <input
                    type="text"
                    id="delivery-phone"
                    class="form-control"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">Delivery Address</label>
                  <textarea
                    id="delivery-address"
                    class="form-control"
                    rows="3"
                    required
                  ></textarea>
                </div>

                <div class="mb-3">
                  <label class="form-label">City</label>
                  <input
                    type="text"
                    id="delivery-city"
                    class="form-control"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">State</label>
                  <input
                    type="text"
                    id="delivery-state"
                    class="form-control"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">Order Note (Optional)</label>
                  <textarea
                    id="delivery-note"
                    class="form-control"
                    rows="2"
                  ></textarea>
                </div>
              </form>

              <div class="d-flex justify-content-between">
                <a href="shop.html" class="btn btn-outline-dark"
                  >← Continue Shopping</a
                >
                <button id="checkout-btn" class="btn btn-success">
                  Go to Checkout
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Paystack must load BEFORE your script -->
  <script src="https://js.paystack.co/v1/inline.js"></script>

  <!-- Your script.js (load ONCE, after Paystack) -->
  <script src="js/script.js"></script>
</html>
