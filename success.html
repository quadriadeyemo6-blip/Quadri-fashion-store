<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Success - Lorem. Fashion</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Roboto:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <style>
      body {
        font-family: "Playfair Display", serif;
        background-color: #fdfdfd;
        color: #333;
      }
      h2 {
        font-weight: 700;
        color: #bfa14a;
        margin-bottom: 1rem;
      }
      .success-box {
        max-width: 700px;
        margin: 60px auto;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        padding: 40px;
        text-align: center;
      }
      .success-icon {
        font-size: 60px;
        color: #28a745;
        margin-bottom: 20px;
      }
      #delivery-info h4 {
        color: #bfa14a;
        margin-top: 30px;
        margin-bottom: 15px;
      }
      #delivery-info p {
        margin: 5px 0;
      }
      .btn-gold {
        background-color: #bfa14a;
        color: #fff;
        font-weight: 600;
        border: none;
        transition: background-color 0.3s ease;
      }
      .btn-gold:hover {
        background-color: #a88c3d;
        color: #fff;
      }
    </style>
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">Fashion</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="shop.html">Shop</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="about.html">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="contact.html">Contact</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Success Section -->
    <section>
      <div class="success-box">
        <div class="success-icon">
          <i class="bi bi-check-circle-fill"></i>
        </div>
        <h2>Order Successful!</h2>
        <p class="lead">
          Thank you for shopping with Quadri Fashion. Your order has been placed
          successfully.
        </p>

        <!-- Delivery Info -->
        <div id="delivery-info" class="text-start"></div>

        <!-- Buttons -->
        <div class="mt-4">
          <a href="shop.html" class="btn btn-outline-dark me-2"
            >← Continue Shopping</a
          >
          <a href="index.html" class="btn btn-gold">Go to Home</a>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center p-3">
      <p>&copy; 2026 Quadri Fashion. All rights reserved.</p>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Load delivery details from localStorage
      const delivery = JSON.parse(localStorage.getItem("deliveryDetails"));

      if (delivery) {
        document.getElementById("delivery-info").innerHTML = `
          <h4>Delivery Information</h4>
          <p><strong>Name:</strong> ${delivery.name}</p>
          <p><strong>Phone:</strong> ${delivery.phone}</p>
          <p><strong>Address:</strong> ${delivery.address}</p>
          <p><strong>City:</strong> ${delivery.city}</p>
          <p><strong>State:</strong> ${delivery.state}</p>
          ${delivery.note ? `<p><strong>Note:</strong> ${delivery.note}</p>` : ""}
        `;
      }
    </script>
  </body>
</html>
